<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Edit Employee</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f7fb;
margin:40px;
}

.container{
width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#444;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
background:#e6f0fa;
color:#333;
width:40%;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

input{
width:100%;
padding:7px;
border:1px solid #ccc;
border-radius:4px;
}

.button-row{
text-align:center;
margin-top:20px;
}

.update-btn{
background:#6fa8dc;
color:white;
border:none;
padding:8px 16px;
border-radius:5px;
cursor:pointer;
}

.update-btn:hover{
background:#5b95c9;
}

.back-btn{
background:#d9e6f5;
color:#333;
border:none;
padding:8px 16px;
border-radius:5px;
cursor:pointer;
margin-left:10px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Edit Employee</h2>

<form th:action="@{/employee/save}" th:object="${employee}" method="post">

<input type="hidden" th:field="*{id}">

<table>

<tr>
<th>Name</th>
<td>
<input type="text" th:field="*{name}">
</td>
</tr>

<tr>
<th>Age</th>
<td>
<input type="number" th:field="*{age}">
</td>
</tr>

<tr>
<th>Department</th>
<td>
<input type="text" th:field="*{dept}">
</td>
</tr>

<tr>
<th>Place</th>
<td>
<input type="text" th:field="*{place}">
</td>
</tr>

<tr>
<th>Joined Year</th>
<td>
<input type="number" th:field="*{joinedYear}">
</td>
</tr>

</table>

<div class="button-row">

<button class="update-btn" type="submit">
Update
</button>

<a th:href="@{/employee/list}" class="back-btn">
Back
</a>

</div>

</form>

</div>

</body>
</html>
